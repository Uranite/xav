[env]
RUSTFLAGS = "-C debuginfo=0 -C target-cpu=native -C opt-level=3 -C codegen-units=1 -C strip=symbols -C panic=abort -Z panic_abort_tests -C lto=fat -C embed-bitcode=yes -Zdylib-lto"

[build]
rustflags = [
    "-C", "debuginfo=0",
    "-C", "target-cpu=native",
    "-C", "opt-level=3",
    "-C", "codegen-units=1",
    "-C", "strip=symbols",
    "-C", "panic=abort",
    "-Z", "panic_abort_tests",
    "-C", "lto=fat",
    "-C", "embed-bitcode=yes",
    "-Z", "dylib-lto",
]
